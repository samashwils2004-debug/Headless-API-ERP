version: "3.9"
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: python:3.11-slim
    working_dir: /workspace/apps/api
    volumes:
      - ./:/workspace
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CONSOLE_ORIGIN=http://localhost:3000
    depends_on:
      - redis
    ports:
      - "8000:8000"
